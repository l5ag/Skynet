<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auscultación · L5AG Skynet</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://unpkg.com/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>
<script src="https://unpkg.com/wellknown@0.5.0/wellknown.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #388bfd;
    --accent-glow: rgba(56,139,253,.25);
    --green: #3fb950;
    --dot: #2be2ec;
    --dot-hover: #ff6b35;
  }

  html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  .app { display: grid; grid-template-rows: 1fr; height: 100vh; }

  .topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
    z-index: 1000;
  }
  .topbar-logo {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .topbar-logo svg { width: 16px; height: 16px; }
  .topbar h1 { font-size: 14px; font-weight: 700; }
  .topbar-sub { font-size: 12px; color: var(--muted); }
  .topbar-sep { flex: 1; }
  .topbar-count {
    font-size: 12px; font-weight: 600;
    background: var(--accent-glow); color: var(--accent);
    padding: 4px 12px; border-radius: 99px;
    border: 1px solid var(--accent);
  }
  .topbar-zoom { display: flex; gap: 4px; }
  .topbar-zoom button {
    font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 6px;
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    cursor: pointer; font-family: inherit; transition: background .15s;
  }
  .topbar-zoom button:hover { background: var(--border); }

  #map { width: 100%; height: 100%; }

  .leaflet-popup-content-wrapper {
    background: var(--panel) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,.6) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .leaflet-popup-tip { background: var(--panel) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; top: 8px !important; right: 10px !important; }

  .popup-inner { padding: 14px 18px; min-width: 180px; }
  .hito-tooltip {
    background: #161b22 !important; color: #e6edf3 !important;
    border: 1px solid #2be2ec !important; border-radius: 6px !important;
    font-size: 12px !important; padding: 6px 10px !important;
    box-shadow: 0 4px 12px rgba(0,0,0,.5) !important;
    white-space: nowrap;
  }
  .hito-tooltip::before { border-top-color: #2be2ec !important; }
  @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .popup-hito { font-size: 18px; font-weight: 800; color: var(--dot); letter-spacing: .02em; margin-bottom: 8px; }
  .popup-row { display: flex; justify-content: space-between; gap: 20px; font-size: 12px; color: var(--muted); margin-top: 4px; }
  .popup-row span:last-child { color: var(--text); font-family: 'Consolas', monospace; font-size: 11.5px; }

  .ctrl-band {
    position: absolute; top: 12px; left: 12px; bottom: 12px;
    width: 240px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    z-index: 900;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .ctrl-section { border-bottom: 1px solid var(--border); }
  .ctrl-section:last-child { border-bottom: 0; }
  .ctrl-header {
    padding: 10px 14px;
    font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted);
    background: rgba(255,255,255,.03);
  }
  .ctrl-body { padding: 10px 14px; }

  .layer-btn {
    width: 100%; font-size: 11px; font-weight: 600; padding: 6px 10px; border-radius: 6px;
    background: rgba(255,255,255,.04); color: var(--muted); border: 1px solid var(--border);
    cursor: pointer; font-family: inherit; transition: all .15s; text-align: left;
    margin-bottom: 4px; display: block;
  }
  .layer-btn:last-child { margin-bottom: 0; }
  .layer-btn.active { background: var(--accent-glow); color: var(--accent); border-color: var(--accent); }

  .side-search input {
    width: 100%; font-family: inherit; font-size: 12px;
    background: rgba(255,255,255,.06); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text); padding: 5px 8px;
    outline: none; margin-bottom: 8px;
  }
  .side-search input::placeholder { color: var(--muted); }
  .side-list {
    flex: 1; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    margin: 0 -14px -10px; padding: 0;
  }
  .side-item {
    padding: 6px 14px; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid rgba(48,54,61,.4);
    transition: background .1s;
  }
  .side-item:hover { background: rgba(56,139,253,.12); color: var(--accent); }
  .side-item::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--dot); flex-shrink: 0;
  }
  .ctrl-section.hitos { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  .ctrl-section.hitos .ctrl-body { flex: 1; display: flex; flex-direction: column; min-height: 0; padding-bottom: 10px; }
  .line-head {
    padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    color: var(--text); border-bottom: 1px solid rgba(48,54,61,.5);
    transition: background .1s;
  }
  .line-head:hover { background: rgba(56,139,253,.12); color: var(--accent); }
  .line-count { font-size:10px; color:var(--muted); font-family:'Consolas',monospace; }

  .lg-row { display:flex; align-items:center; gap:8px; font-size:11px; margin-bottom:3px; }
  .lg-sw { width:22px; height:12px; border-radius:2px; opacity:.85; flex-shrink:0; }
</style>
</head>
<body>
<div class="app">
  <div style="position:absolute;top:12px;right:12px;z-index:1000;display:flex;gap:6px;align-items:center;">
    <span class="topbar-count" id="countBadge">— puntos</span>
    <div class="topbar-zoom">
      <button onclick="fitAll()">⊞ Ver todos</button>
    </div>
  </div>

  <div style="position:relative; height:100%;">
    <div id="map"></div>

    <div class="ctrl-band">
      <div class="ctrl-section" id="reproductor-section">
        <div class="ctrl-header">Reproductor</div>
        <div class="ctrl-body">
          <div style="display:flex;align-items:center;gap:8px;font-size:11px;">
            <button id="btn-idw-play" onclick="toggleIDWPlay()" title="Reproducir / pausar secuencia IDW"
              style="background:rgba(56,139,253,.18);border:1px solid var(--accent);color:var(--accent);width:30px;height:26px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">▶</button>
            <span style="color:var(--muted);">Velocidad</span>
            <input type="range" id="idwSpeed" min="200" max="2000" step="100" value="1400" style="flex:1;accent-color:var(--accent);" oninput="onIdwSpeedChange(this.value)">
            <span id="idwSpeedVal" style="font-family:'Consolas',monospace;color:var(--accent);min-width:46px;text-align:right;">800 ms</span>
          </div>
        </div>
      </div>
      <div class="ctrl-section">
        <div class="ctrl-header">Capas base</div>
        <div class="ctrl-body">
          <button class="layer-btn active" id="btn-sat" onclick="setLayer('sat')">🛰 Satélite</button>
          <button class="layer-btn" id="btn-osm" onclick="setLayer('osm')">🗺 Calles</button>
          <button class="layer-btn" id="btn-topo" onclick="setLayer('topo')">⛰ Topográfico</button>
        </div>
      </div>
      <div class="ctrl-section">
        <div class="ctrl-header">Capas de datos</div>
        <div class="ctrl-body">
          <button class="layer-btn active" id="btn-kml" onclick="toggleKML()">📐 Trazados L5</button>
          <button class="layer-btn active" id="btn-idw" onclick="toggleIDW()">🌡 IDW Cotas</button>
          <button class="layer-btn active" id="btn-frentes" onclick="toggleFrentes()">⚙ Frentes túnel</button>
        </div>
      </div>
      <div class="ctrl-section" id="idw-legend">
        <div class="ctrl-header">IDW Δ Cota (mm)</div>
        <div class="ctrl-body">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:11px;">
            <span style="color:var(--muted);min-width:60px;">Opacidad</span>
            <input type="range" id="idwOpacity" min="0" max="100" step="1" value="85" style="flex:1;accent-color:var(--accent);" oninput="setIdwOpacity(this.value)">
            <span id="idwOpacityVal" style="font-family:'Consolas',monospace;color:var(--accent);min-width:34px;text-align:right;">85%</span>
          </div>
          <div class="lg-row"><span class="lg-sw" style="background:rgb(40,0,0);"></span><span>≤ −14 (subsidencia)</span></div>
          <div class="lg-row"><span class="lg-sw" style="background:rgb(80,0,0);"></span><span>−10</span></div>
          <div class="lg-row"><span class="lg-sw" style="background:rgb(180,30,20);"></span><span>−8</span></div>
          <div class="lg-row"><span class="lg-sw" style="background:rgb(230,100,30);"></span><span>−6</span></div>
          <div class="lg-row"><span class="lg-sw" style="background:rgb(245,180,50);"></span><span>−4</span></div>
          <div class="lg-row"><span class="lg-sw" style="background:transparent;border:1px dashed #6e7681;"></span><span>−2 a +2 (estable)</span></div>
          <div class="lg-row"><span class="lg-sw" style="background:rgb(158,202,225);"></span><span>+4</span></div>
          <div class="lg-row"><span class="lg-sw" style="background:rgb(107,174,214);"></span><span>+6</span></div>
          <div class="lg-row"><span class="lg-sw" style="background:rgb(66,146,198);"></span><span>+8</span></div>
          <div class="lg-row"><span class="lg-sw" style="background:rgb(33,113,181);"></span><span>+10</span></div>
          <div class="lg-row"><span class="lg-sw" style="background:rgb(8,48,107);"></span><span>≥ +14 (alzamiento)</span></div>
        </div>
      </div>
      <div class="ctrl-section hitos">
        <div class="ctrl-header">Líneas de Hitos</div>
        <div class="ctrl-body side-search">
          <input type="text" id="searchInput" placeholder="Buscar línea (H1, H2…)…" oninput="filterList(this.value)">
          <div class="side-list" id="sideList"></div>
        </div>
      </div>
    </div>

    <div id="idw-slider" style="
      position:absolute; bottom:18px; left:calc(50% + 130px); transform:translateX(-50%);
      background:var(--panel); border:1px solid var(--border); border-radius:10px;
      padding:8px 16px; z-index:900; min-width:780px; max-width:80vw;
      box-shadow:0 4px 20px rgba(0,0,0,.6);
      display:flex; align-items:center; gap:14px;
    ">
      <span id="idw-min" style="font-size:10px;color:var(--muted);font-family:'Consolas',monospace;white-space:nowrap;">—</span>
      <input type="range" id="dateSlider" min="0" max="0" step="1" value="0" style="flex:1;accent-color:var(--accent);min-width:0;" oninput="onSliderChange(this.value)">
      <span id="idw-max" style="font-size:10px;color:var(--muted);font-family:'Consolas',monospace;white-space:nowrap;">—</span>
      <span id="idw-count" style="font-size:10px;color:var(--muted);font-family:'Consolas',monospace;white-space:nowrap;">0 / 0</span>
      <div style="display:flex;gap:4px;">
        <button id="btn-prev" onclick="stepDate(-1)" style="background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);width:26px;height:26px;border-radius:5px;cursor:pointer;font-family:inherit;">‹</button>
        <button id="btn-next" onclick="stepDate(1)" style="background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);width:26px;height:26px;border-radius:5px;cursor:pointer;font-family:inherit;">›</button>
      </div>
      <div id="idw-date-label" style="font-weight:700;font-size:14px;color:var(--accent);font-family:'Consolas',monospace;white-space:nowrap;min-width:96px;text-align:right;">—</div>
    </div>

  </div>
</div>

<script>

proj4.defs("EPSG:25830", "+proj=utm +zone=30 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs");

function utmToLatLng(x, y) {
  const [lng, lat] = proj4("EPSG:25830", "WGS84", [x, y]);
  return [lat, lng];
}

// ── Parse CSV ─────────────────────────────────────────────────────────────────
const lines = CSV.trim().split('\n').slice(1);
const points = lines.map(l => {
  const [hito, x, y] = l.split(';');
  return { hito: hito.trim(), x: parseFloat(x), y: parseFloat(y) };
});

// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false, maxZoom: 19 });
L.control.zoom({ position: 'bottomright' }).addTo(map);

const layers = {
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Esri World Imagery', maxZoom: 19, maxNativeZoom: 18
  }),
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenTopoMap', maxZoom: 17
  })
};
layers.sat.addTo(map);
let activeLayer = 'sat';

function setLayer(name) {
  map.removeLayer(layers[activeLayer]);
  layers[name].addTo(map);
  activeLayer = name;
  document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
}

// ── Custom icon ───────────────────────────────────────────────────────────────
function pointInPolygon(layer, latlng) {
  const g = layer.feature && layer.feature.geometry;
  if (!g) return false;
  const polys = g.type === 'MultiPolygon' ? g.coordinates : [g.coordinates];
  const x = latlng.lng, y = latlng.lat;
  for (const poly of polys) {
    const ring = poly[0];
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const xi = ring[i][0], yi = ring[i][1];
      const xj = ring[j][0], yj = ring[j][1];
      const intersect = ((yi > y) !== (yj > y)) &&
        (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
      if (intersect) inside = !inside;
    }
    if (inside) return true;
  }
  return false;
}

function makeIcon(hovered) {
  const color = hovered ? '#ff6b35' : '#2be2ec';
  return L.divIcon({
    className: '',
    html: `<svg width="14" height="14" viewBox="0 0 14 14">
      <circle cx="7" cy="7" r="5" fill="${color}" stroke="rgba(0,0,0,.5)" stroke-width="1.5"/>
      <circle cx="7" cy="7" r="2" fill="white" opacity=".7"/>
    </svg>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -10]
  });
}

// ── Place markers ─────────────────────────────────────────────────────────────
const markers = {};
const latLngs = [];

points.forEach(p => {
  const ll = utmToLatLng(p.x, p.y);
  latLngs.push(ll);

  const marker = L.marker(ll, { icon: makeIcon(false) });

  const popupHtml = `
    <div class="popup-inner">
      <div class="popup-hito">${p.hito}</div>
      <div class="popup-row"><span>X UTM</span><span>${p.x.toFixed(3)}</span></div>
      <div class="popup-row"><span>Y UTM</span><span>${p.y.toFixed(3)}</span></div>
      <div class="popup-row"><span>Lat</span><span>${ll[0].toFixed(6)}</span></div>
      <div class="popup-row"><span>Lon</span><span>${ll[1].toFixed(6)}</span></div>
    </div>`;

  marker.bindPopup(popupHtml, { maxWidth: 220 });
  marker.bindTooltip('', { direction: 'top', offset: [0, -8], className: 'hito-tooltip', opacity: 1 });

  marker.on('mouseover', () => {
    marker.setIcon(makeIcon(true));
    let cota = '—';
    if (idwLayer) {
      const ll2 = marker.getLatLng();
      idwLayer.eachLayer(l => {
        if (cota !== '—') return;
        if (pointInPolygon(l, ll2)) {
          const pp = l.feature.properties;
          const mid = (pp.ELEV_MIN + pp.ELEV_MAX) / 2;
          cota = mid.toFixed(2) + ' mm';
        }
      });
    }
    marker.setTooltipContent(`<b style="color:#2be2ec">${p.hito}</b><br>Δ Cota: <b>${cota}</b>`);
    marker.openTooltip();
  });
  marker.on('mouseout', () => { marker.setIcon(makeIcon(false)); marker.closeTooltip(); });
  marker.addTo(map);
  markers[p.hito] = { marker, ll };
});

const bounds = L.latLngBounds(latLngs);
map.fitBounds(bounds, { padding: [40, 40] });

function fitAll() { map.fitBounds(bounds, { padding: [40, 40] }); }

document.getElementById('countBadge').textContent = points.length + ' puntos';

// ── Side list ─────────────────────────────────────────────────────────────────
function parseLinea(hito) { const m = hito.match(/^H(\d+)\./i); return m ? m[1] : '?'; }

function buildList(filter) {
  const list = document.getElementById('sideList');
  list.innerHTML = '';
  const f = (filter || '').toLowerCase();
  const grupos = {};
  points.forEach(p => { const ln = parseLinea(p.hito); (grupos[ln] = grupos[ln] || []).push(p); });
  const lineas = Object.keys(grupos).sort((a, b) => (+a) - (+b));
  lineas.forEach(ln => {
    const items = grupos[ln];
    if (f && !(('h' + ln).includes(f))) return;
    const head = document.createElement('div');
    head.className = 'line-head';
    head.innerHTML = `<span>H${ln}</span><span class="line-count">${items.length}</span>`;
    head.onclick = () => {
      const lls = items.map(p => markers[p.hito].ll);
      if (!lls.length) return;
      if (lls.length === 1) { map.setView(lls[0], 18, { animate: true }); markers[items[0].hito].marker.openPopup(); }
      else { map.fitBounds(L.latLngBounds(lls), { padding: [40, 40], animate: true }); }
    };
    list.appendChild(head);
  });
}
function filterList(val) { buildList(val); }
buildList();

// ── Frentes de túnel ──────────────────────────────────────────────────────
let pkLookup = null;
let frentesData = null;
const frenteMarkers = {};
const FRENTE_NAMES = ['OLBE', 'OLAP', 'ABGA', 'ABHO'];
const FRENTE_COLOR = '#a8a8a8';

function makeGearIcon(name, size) {
  const s = size || 38;
  const teethAngles = (name === 'ABGA') ? [0, 90, 135, 270] : [0, 45, 90, 135, 180, 225, 270, 315];
  const teeth = teethAngles.map(a => `<polygon points="0,-26 -4,-18 4,-18" transform="rotate(${a})"/>`).join('');
  return L.divIcon({
    className: '',
    html: `<svg width="${s}" height="${s}" viewBox="0 0 60 60" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,.7));transform-origin:50% 50%;animation:gear-spin 4s linear infinite;">
      <g transform="translate(30 30)">
        <g fill="${FRENTE_COLOR}" stroke="#000" stroke-width=".8">${teeth}</g>
        <circle r="18" fill="${FRENTE_COLOR}" stroke="#000" stroke-width="1"/>
        <circle r="6" fill="#1a1a1a"/>
      </g>
    </svg>`,
    iconSize: [s, s], iconAnchor: [s/2, s/2], popupAnchor: [0, -s/2]
  });
}

function gearSizeForZoom(z) { return Math.round(Math.max(12, Math.min(48, (z - 12) * 6))); }

function updateGearSizes() {
  const z = map.getZoom();
  const s = gearSizeForZoom(z);
  FRENTE_NAMES.forEach(n => { if (frenteMarkers[n]) frenteMarkers[n].setIcon(makeGearIcon(n, s)); });
}

FRENTE_NAMES.forEach(name => {
  const m = L.marker([0, 0], { icon: makeGearIcon(name, gearSizeForZoom(map.getZoom() || 16)), opacity: 0, interactive: true });
  m.bindTooltip('', { direction: 'top', offset: [0, -10], className: 'hito-tooltip', opacity: 1 });
  frenteMarkers[name] = m;
});
map.on('zoomend', updateGearSizes);

let frentesVisible = true;

function buscarPkFrente(nombre, fechaISO) {
  const data = frentesData?.[nombre];
  if (!data) return null;
  const fechas = Object.keys(data).filter(f => f <= fechaISO).sort();
  if (!fechas.length) return null;
  return { fecha: fechas[fechas.length - 1], pk: data[fechas[fechas.length - 1]] };
}

function actualizarFrentes(fechaISO) {
  if (!pkLookup || !frentesData) return;
  FRENTE_NAMES.forEach(name => {
    const m = frenteMarkers[name];
    const info = buscarPkFrente(name, fechaISO);
    if (!info) { m.setOpacity(0); return; }
    const coords = pkLookup[info.pk];
    if (!coords) { m.setOpacity(0); return; }
    m.setLatLng([coords[0], coords[1]]);
    m.setOpacity(frentesVisible ? 1 : 0);
    m.setTooltipContent(
      `<b style="color:${FRENTE_COLOR}">⚙ Frente ${name}</b><br>PK: <b>${info.pk}</b><br>Fecha posición: <b>${info.fecha}</b>`
    );
  });
}

function toggleFrentes() {
  frentesVisible = !frentesVisible;
  const btn = document.getElementById('btn-frentes');
  if (frentesVisible) {
    FRENTE_NAMES.forEach(n => frenteMarkers[n].addTo(map));
    btn.classList.add('active');
    if (idwArchivos[idwIdx]) actualizarFrentes(idwArchivos[idwIdx].fecha);
  } else {
    FRENTE_NAMES.forEach(n => map.removeLayer(frenteMarkers[n]));
    btn.classList.remove('active');
  }
}

function excelDateToISO(serial) {
  const ms = (serial - 25569) * 86400 * 1000;
  return new Date(ms).toISOString().slice(0, 10);
}

// ── Cargar Excels (rutas adaptadas a Skynet) ──────────────────────────────
async function cargarExcels() {
  const [pkBuf, frBuf] = await Promise.all([
    fetch(PATHS.trazadosPuntos).then(r => r.arrayBuffer()),
    fetch(PATHS.convergencias).then(r => r.arrayBuffer())
  ]);

  const wbPk = XLSX.read(pkBuf, { type: 'array' });
  const eje08 = XLSX.utils.sheet_to_json(wbPk.Sheets['EJE_08']);
  const pk = {};
  eje08.forEach(r => {
    const k = Math.round(r.PK);
    if (!pk[k]) pk[k] = [r.Latitud, r.Longitud];
  });

  const wbFr = XLSX.read(frBuf, { type: 'array' });
  const fr = {};
  FRENTE_NAMES.forEach(name => {
    const sh = wbFr.Sheets['TUNEL DE LÍNEA - ' + name];
    if (!sh) { fr[name] = {}; return; }
    const rows = XLSX.utils.sheet_to_json(sh);
    const byDate = {};
    rows.forEach(r => {
      const iso = excelDateToISO(r.FECHA);
      const pkFr = Math.round(r['PK FRENTE']);
      if (!byDate[iso]) byDate[iso] = pkFr;
    });
    fr[name] = byDate;
  });

  return { pk, fr };
}

cargarExcels().then(({pk, fr}) => {
  pkLookup = pk;
  frentesData = fr;
  FRENTE_NAMES.forEach(n => frenteMarkers[n].addTo(map));
  if (idwArchivos[idwIdx]) actualizarFrentes(idwArchivos[idwIdx].fecha);
  console.log('✓ Excels cargados:', FRENTE_NAMES.map(n => Object.keys(fr[n]||{}).length + ' ' + n).join(', '));
}).catch(e => console.error('Error cargando Excels:', e));

// ── KML Layer (referenciado desde repo Hitos) ─────────────────────────────
let kmlLayer = null;
let kmlVisible = true;

function kmlColorToCSS(kmlColor, alpha) {
  if (!kmlColor || kmlColor.length < 8) return alpha !== undefined ? `rgba(255,255,255,${alpha})` : '#ffffff';
  const a = parseInt(kmlColor.substring(0,2), 16) / 255;
  const b = parseInt(kmlColor.substring(2,4), 16);
  const g = parseInt(kmlColor.substring(4,6), 16);
  const r = parseInt(kmlColor.substring(6,8), 16);
  return `rgba(${r},${g},${b},${alpha !== undefined ? alpha : a})`;
}

fetch(PATHS.kml)
  .then(r => r.text())
  .then(kmlText => {
    const clean = kmlText.replace(/ns0:/g, '').replace(/xmlns:ns0="[^"]*"/g, '');
    const parser = new DOMParser();
    const kmlDom = parser.parseFromString(clean, 'text/xml');
    const geojson = toGeoJSON.kml(kmlDom);
    kmlLayer = L.geoJSON(geojson, {
      style: feature => {
        const styleId = (feature.properties?.styleUrl || '').replace('#','');
        let color, fillColor, weight, fillOpacity, dashArray;
        if (styleId.includes('eje_197') || styleId.includes('lineStyle') && !styleId.includes('2')) {
          color = '#30f71e'; fillColor = '#30f71e'; weight = 2; fillOpacity = 0.15;
        } else if (styleId.includes('dxfClosed') || styleId === '') {
          color = '#00ffff'; fillColor = 'transparent'; weight = 1.5; fillOpacity = 0; dashArray = '6 4';
        } else {
          color = '#04b831'; fillColor = '#04b831'; weight = 2; fillOpacity = 0.2;
        }
        return { color, fillColor, weight, fillOpacity, dashArray, opacity: 0.9 };
      },
      onEachFeature: (feature, layer) => {
        const name = feature.properties?.name || '';
        if (name) {
          layer.bindPopup(`<div class="popup-inner"><div class="popup-hito" style="font-size:13px;">${name}</div><div class="popup-row"><span>Tipo</span><span>${feature.geometry?.type || '—'}</span></div></div>`, { maxWidth: 260 });
        }
      }
    }).addTo(map);
    kmlLayer.bringToBack();
  })
  .catch(e => console.error('Error cargando KML:', e));

// ── IDW Layer ─────────────────────────────────────────────────────────────────
let idwLayer = null;
let idwVisible = true;
let idwOpacity = 0.85;

function setIdwOpacity(v) {
  idwOpacity = (+v) / 100;
  document.getElementById('idwOpacityVal').textContent = v + '%';
  if (idwLayer) {
    idwLayer.eachLayer(l => {
      const mid = (l.feature.properties.ELEV_MIN + l.feature.properties.ELEV_MAX) / 2;
      l.setStyle({ fillOpacity: Math.abs(mid) > ELEV_DEAD_ZONE ? idwOpacity : 0 });
    });
  }
}

const ELEV_MIN_GLOBAL = -14, ELEV_MAX_GLOBAL = 14, ELEV_DEAD_ZONE = 2;

const RAMP = [
  [-14,[40,0,0]],[-10,[80,0,0]],[-8,[180,30,20]],[-6,[230,100,30]],[-4,[245,180,50]],
  [-2,[250,230,100]],[-1,[253,240,180]],[1,[220,235,245]],[2,[198,219,239]],
  [4,[158,202,225]],[6,[107,174,214]],[8,[66,146,198]],[10,[33,113,181]],[14,[8,48,107]],
];

function elevToColor(val) {
  if (Math.abs(val) <= ELEV_DEAD_ZONE) return null;
  const v = Math.max(ELEV_MIN_GLOBAL, Math.min(ELEV_MAX_GLOBAL, val));
  for (let i = 1; i < RAMP.length; i++) {
    if (v <= RAMP[i][0]) {
      const t = (v - RAMP[i-1][0]) / (RAMP[i][0] - RAMP[i-1][0]);
      const a = RAMP[i-1][1], b = RAMP[i][1];
      return `rgb(${Math.round(a[0]+t*(b[0]-a[0]))},${Math.round(a[1]+t*(b[1]-a[1]))},${Math.round(a[2]+t*(b[2]-a[2]))})`;
    }
  }
  return 'rgb(165,0,38)';
}

function parseCSV(text) {
  const rows = [];
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    let wkt, rest;
    if (line.startsWith('"')) {
      const closeQuote = line.lastIndexOf('"');
      wkt = line.slice(1, closeQuote);
      rest = line.slice(closeQuote + 2).split(',');
    } else {
      const firstComma = line.indexOf(',');
      wkt = line.slice(0, firstComma);
      rest = line.slice(firstComma + 1).split(',');
    }
    const obj = { WKT: wkt };
    for (let j = 0; j < rest.length; j++) { obj[headers[j + 1]?.trim()] = rest[j]; }
    rows.push(obj);
  }
  return rows;
}

// ── Slider de fechas IDW ──────────────────────────────────────────────
let idwArchivos = [];
let idwIdx = 0;

function parseFechaDeNombre(nombre) {
  const m = nombre.match(/IDW_(\d{2})(\d{2})(\d{2})\.csv/i);
  if (!m) return { fecha: nombre, label: nombre };
  return { fecha: `20${m[1]}-${m[2]}-${m[3]}`, label: `${m[3]}/${m[2]}/20${m[1]}` };
}

function cargarIDW(archivo) {
  return fetch(PATHS.idwDir + archivo)
    .then(r => r.text())
    .then(text => {
      const rows = parseCSV(text);
      const features = rows.map(row => {
        try {
          const elevMax = parseFloat(row.ELEV_MAX);
          if (elevMax === 0) return null;
          const geom = wellknown.parse(row.WKT);
          if (!geom) return null;
          return { type: 'Feature', geometry: geom, properties: {
            fid: row.fid, ID: row.ID,
            ELEV_MIN: parseFloat(row.ELEV_MIN), ELEV_MAX: elevMax,
          }};
        } catch(e) { return null; }
      }).filter(Boolean);

      if (idwLayer) { map.removeLayer(idwLayer); idwLayer = null; }

      idwLayer = L.geoJSON({ type: 'FeatureCollection', features }, {
        style: f => {
          const mid = (f.properties.ELEV_MIN + f.properties.ELEV_MAX) / 2;
          const c = elevToColor(mid);
          return { color: 'rgba(0,0,0,0.15)', weight: 0.5, fillColor: c || '#000', fillOpacity: c ? idwOpacity : 0 };
        },
        onEachFeature: (f, layer) => {
          const p = f.properties;
          layer.bindPopup(`<div class="popup-inner"><div class="popup-hito" style="font-size:13px;">IDW · ID ${p.ID}</div><div class="popup-row"><span>Fecha</span><span>${idwArchivos[idwIdx]?.label ?? '—'}</span></div><div class="popup-row"><span>Δ Cota mín</span><span>${p.ELEV_MIN?.toFixed(2)} mm</span></div><div class="popup-row"><span>Δ Cota máx</span><span>${p.ELEV_MAX?.toFixed(2)} mm</span></div></div>`, { maxWidth: 220 });
          const mid = (p.ELEV_MIN + p.ELEV_MAX) / 2;
          const hasColor = Math.abs(mid) > ELEV_DEAD_ZONE;
          layer.on('mouseover', () => layer.setStyle({ fillOpacity: hasColor ? Math.min(1, idwOpacity + 0.15) : 0, weight: 1.5 }));
          layer.on('mouseout',  () => idwLayer.resetStyle(layer));
        }
      });
      if (idwVisible) {
        idwLayer.addTo(map);
        if (kmlLayer && kmlVisible) kmlLayer.bringToBack();
      }
    })
    .catch(e => console.error('Error cargando IDW CSV:', archivo, e));
}

function actualizarUISlider() {
  const cur = idwArchivos[idwIdx];
  document.getElementById('idw-date-label').textContent = cur ? cur.label : '—';
  if (cur) actualizarFrentes(cur.fecha);
  document.getElementById('idw-count').textContent = `${idwIdx + 1} / ${idwArchivos.length}`;
  document.getElementById('idw-min').textContent = idwArchivos[0]?.label ?? '—';
  document.getElementById('idw-max').textContent = idwArchivos[idwArchivos.length - 1]?.label ?? '—';
  document.getElementById('dateSlider').value = idwIdx;
}

function onSliderChange(v) {
  const i = parseInt(v, 10);
  if (i === idwIdx || !idwArchivos[i]) return;
  idwIdx = i;
  actualizarUISlider();
  cargarIDW(idwArchivos[idwIdx].archivo);
}

function stepDate(d) {
  const ni = Math.max(0, Math.min(idwArchivos.length - 1, idwIdx + d));
  if (ni === idwIdx) return;
  idwIdx = ni;
  actualizarUISlider();
  cargarIDW(idwArchivos[idwIdx].archivo);
}

// ── Play / Pause IDW ──────────────────────────────────────────────────
let idwPlaying = false;
let idwPlayTimer = null;

function _idwTick() {
  if (!idwPlaying) return;
  if (idwIdx >= idwArchivos.length - 1) { pauseIDWPlay(); return; }
  idwIdx++;
  actualizarUISlider();
  cargarIDW(idwArchivos[idwIdx].archivo).finally(() => {
    if (!idwPlaying) return;
    const raw = parseInt(document.getElementById('idwSpeed').value, 10) || 1400;
    idwPlayTimer = setTimeout(_idwTick, 2200 - raw);
  });
}

function startIDWPlay() {
  if (!idwArchivos.length || idwPlaying) return;
  if (!idwVisible) toggleIDW();
  idwPlaying = true;
  document.getElementById('btn-idw-play').innerHTML = '⏸';
  if (idwIdx >= idwArchivos.length - 1) idwIdx = -1;
  _idwTick();
}

function pauseIDWPlay() {
  idwPlaying = false;
  if (idwPlayTimer) clearTimeout(idwPlayTimer);
  idwPlayTimer = null;
  const btn = document.getElementById('btn-idw-play');
  if (btn) btn.innerHTML = '▶';
}

function toggleIDWPlay() { if (idwPlaying) pauseIDWPlay(); else startIDWPlay(); }

function onIdwSpeedChange(v) {
  document.getElementById('idwSpeedVal').textContent = (2200 - parseInt(v, 10)) + ' ms';
}

// ── Auto-descubrimiento IDW (GitHub API → repo Skynet) ────────────────
async function descubrirArchivos() {
  const r = await fetch(PATHS.githubApiIDW);
  if (!r.ok) throw new Error('GitHub API ' + r.status);
  const items = await r.json();
  return items
    .filter(i => i.type === 'file' && /^IDW_\d{6}\.csv$/i.test(i.name))
    .map(i => i.name);
}

descubrirArchivos()
  .then(lista => {
    idwArchivos = lista
      .map(a => ({ archivo: a, ...parseFechaDeNombre(a) }))
      .sort((x, y) => x.fecha.localeCompare(y.fecha));

    if (!idwArchivos.length) {
      document.getElementById('idw-slider').style.display = 'none';
      return;
    }

    idwIdx = idwArchivos.length - 1;
    const slider = document.getElementById('dateSlider');
    slider.min = 0;
    slider.max = idwArchivos.length - 1;
    slider.value = idwIdx;
    actualizarUISlider();
    cargarIDW(idwArchivos[idwIdx].archivo);
  })
  .catch(e => {
    console.error('Error descubriendo archivos:', e);
    document.getElementById('idw-slider').style.display = 'none';
  });

function toggleIDW() {
  const btn = document.getElementById('btn-idw');
  const legend = document.getElementById('idw-legend');
  const slider = document.getElementById('idw-slider');
  if (idwVisible) {
    if (idwLayer) map.removeLayer(idwLayer);
    btn.classList.remove('active');
    legend.style.display = 'none';
    slider.style.display = 'none';
  } else {
    if (idwLayer) {
      map.addLayer(idwLayer);
      if (kmlLayer && kmlVisible) kmlLayer.bringToBack();
    }
    btn.classList.add('active');
    legend.style.display = 'block';
    slider.style.display = 'flex';
  }
  idwVisible = !idwVisible;
}

function toggleKML() {
  const btn = document.getElementById('btn-kml');
  if (!kmlLayer) return;
  if (kmlVisible) { map.removeLayer(kmlLayer); btn.classList.remove('active'); }
  else { map.addLayer(kmlLayer); kmlLayer.bringToBack(); btn.classList.add('active'); }
  kmlVisible = !kmlVisible;
}
