name: Sync estado.json desde Hodei

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Descargar estado.json de Hodei
        run: |
          mkdir -p data
          curl -sS -f -L -o data/estado.json \
            -H "User-Agent: Mozilla/5.0" \
            "https://hodei.ets-rfv.eus/s/adRQL9Bx3wPC5mw/download?path=%2Festado_test.json"
          echo "Descargado OK — primeros 100 chars:"
          head -c 100 data/estado.json
          echo ""
          cat data/estado.json | python3 -m json.tool > /dev/null && echo "JSON valido" || exit 1

      - name: Commit solo si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/estado.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "Actualizar estado.json"
            git push
          fi
